name: C-CI

on:
  push:
    branches: [ "main", "EVA+" ]
  pull_request:
    branches: [ "main", "EVA+" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format gcc make
      - name: Build and Test
        run: |
          make check-format
          make test
