name: C/C++ CI

on:
  push:
    branches: [ "EVA+" ]
  pull_request:
    branches: [ "EVA+" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format gcc make
    - name: Compile
      run: make
    - name: Lint
      run: make check-format
    - name: Run Tests
      run: make test
